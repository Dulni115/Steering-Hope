<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1>DONATION</h1>
        <span class="tagline">"Support their journey"</span>
    </div>

    <hr class="section-divider">

    <h3>Donation Cards</h3>
    <div class="radio-grid">
        <label class="custom-radio"><input type="radio" name="amount"> Rs:100/=</label>
        <label class="custom-radio"><input type="radio" name="amount"> Rs:2000/=</label>
        <label class="custom-radio"><input type="radio" name="amount"> Rs:500/=</label>
        <label class="custom-radio"><input type="radio" name="amount"> Rs:5000/=</label>
        <label class="custom-radio"><input type="radio" name="amount"> Rs:1000/=</label>
        <label class="custom-radio"><input type="radio" name="amount"> Custom Amount</label>
    </div>

    <hr class="section-divider">

    <h3>Payment Methods</h3>
    <div class="radio-list">
        <label class="custom-radio"><input type="radio" name="payment"> Card Payment</label>
        <label class="custom-radio"><input type="radio" name="payment"> Digital Wallet</label>
        <label class="custom-radio"><input type="radio" name="payment"> Bank Transfer</label>
    </div>

    <div class="form-actions">
        <button class="submit-btn font-right">DONATE NOW</button>
    </div>
</div>

<footer>
    <div class="footer-container">
        <div class="footer-contact">
            <h4>Get in touch</h4>
            <p>📞 0112-223333</p>
            <p>📍 No:21, Kynsey road, Colombo</p>
            <div class="social-icons">🌐 📷 🟦</div>
        </div>
        <div class="footer-right">
            <div class="footer-brand">
                <div class="logo-text">STEERING<br>HOPE</div>
                <div class="footer-subtext">driving hope ahead</div>
            </div>
            <div class="footer-qr-container">
                <img src="images/qrcode.png" alt="Website QR Code" class="qr-code-img">
            </div>
        </div>
    </div>
    <div class="copyright">
        Copyright © 2026 steeringhope.lk | All rights reserved
    </div>
</footer>

</body>
</html>
