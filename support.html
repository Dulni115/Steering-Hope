<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

        <h1>OFFER SUPPORT</h1>
        <span class="tagline">"More than a donation"</span>
    </div>

    <hr class="section-divider">

    <h3>Support Categories</h3>
    <div class="radio-list vertical-spacing">
        <label class="custom-radio"><input type="radio" name="support"> Safety Gear</label>
        <label class="custom-radio"><input type="radio" name="support"> School Supplies</label>
        <label class="custom-radio"><input type="radio" name="support"> Medical Support</label>

    <div class="form-actions">

</div>

<footer>

        <div class="footer-contact">
            <h4>Get in touch</h4>
            <p>📞 0112-223333</p>
            <p>📍 No:21, Kynsey road, Colombo</p>
            <div class="social-icons">🌐 📷 🟦</div>
        </div>
        <div class="footer-right">

                <div class="logo-text">STEERING<br>HOPE</div>
